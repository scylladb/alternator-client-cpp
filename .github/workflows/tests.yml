name: 'Run tests'

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: ./

jobs:
  test:
    name: Build lint and run tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++ \
            libcurl4-openssl-dev \
            libgtest-dev \
            openssl

      - name: Run build
        run: |
          make build

      - name: Run linters
        run: |
          make check

      - name: Run unit tests
        run: |
          make test-unit

      - name: Run integration tests
        run: |
          make test-integration

      - name: Stop Scylla
        if: always()
        run: |
          make scylla-stop
